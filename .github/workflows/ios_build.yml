name: iOS Build (No Codesign)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch: # Memungkinkan trigger manual dari tab Actions di GitHub

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        working-directory: frontend
        run: |
          # Build aplikasi iOS tanpa signing certificate (berguna untuk sideloading via AltStore/Sideloadly)
          flutter build ios --release --no-codesign
          
          # Membuat folder Payload untuk membungkus Runner.app menjadi format .ipa
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r budgetkos_ios.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudgetKos-iOS-IPA
          path: frontend/budgetkos_ios.ipa
          retention-days: 7
